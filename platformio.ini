[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

lib_deps =
  me-no-dev/AsyncTCP
  me-no-dev/ESPAsyncWebServer
  rstephan/ArtnetWifi
  someweisguy/esp_dmx

[env:native]
platform = native
test_framework = unity
build_flags =
  -I include
build_src_filter = -<*>
