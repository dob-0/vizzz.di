[platformio]
name = vizzz.di
core_dir = .platformio-core

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
monitor_speed = 115200

build_unflags =
  -fexceptions
build_flags =
  -fno-exceptions
  -DCORE_DEBUG_LEVEL=0
build_src_flags =
  -fno-threadsafe-statics

lib_deps =
  me-no-dev/AsyncTCP
  me-no-dev/ESPAsyncWebServer
  someweisguy/esp_dmx

[env:native]
platform = native
test_framework = unity
build_flags =
  -I include
build_src_filter = -<*>
